<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CEDRIC AUTO | PREMIUM</title>
    <style>
        body { 
            background-color: #080808; 
            color: #ffffff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            letter-spacing: 0.5px;
        }
        .main-frame { width: 80%; max-width: 380px; }
        
        .header { margin-bottom: 60px; text-align: left; }
        .header h1 { 
            font-size: 24px; 
            font-weight: 200; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 6px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
            display: inline-block;
        }
        .header p { 
            font-size: 10px; 
            color: #555; 
            margin: 10px 0 0; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
        }

        .form-section { margin-top: 40px; }
        .input-wrapper { margin-bottom: 35px; }
        .input-wrapper label { 
            display: block; 
            font-size: 9px; 
            color: #666; 
            text-transform: uppercase; 
            margin-bottom: 10px;
            font-weight: 600;
        }
        .input-wrapper input {
            width: 100%; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid #1a1a1a;
            color: #fff; 
            padding: 8px 0; 
            font-size: 15px; 
            outline: none;
            transition: border-color 0.4s ease;
        }
        .input-wrapper input:focus { border-bottom-color: #ffffff; }

        .btn-access {
            width: 100%; 
            padding: 20px; 
            background: transparent; 
            color: #fff; 
            border: 1px solid #fff;
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 4px;
            cursor: pointer; 
            transition: all 0.3s ease;
            font-weight: bold;
        }
        .btn-access:hover { background: #fff; color: #000; }
        .btn-access:active { transform: scale(0.98); opacity: 0.8; }

        .nav-footer { 
            margin-top: 50px; 
            display: flex; 
            justify-content: space-between; 
            border-top: 1px solid #1a1a1a;
            padding-top: 20px;
        }
        .nav-footer a { 
            color: #444; 
            text-decoration: none; 
            font-size: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-footer a:hover { color: #fff; }
    </style>
</head>
<body>

<div class="main-frame">
    <div class="header">
        <h1>Cedric Auto</h1>
        <p>Advanced Vehicle Interface</p>
    </div>

    <div class="form-section">
        <div class="input-wrapper">
            <label>Sistem Yetkilisi</label>
            <input type="text" autocomplete="off">
        </div>

        <div class="input-wrapper">
            <label>Erişim Anahtarı</label>
            <input type="password">
        </div>

        <button class="btn-access">Oturum Aç</button>
    </div>

    <div class="nav-footer">
        <a href="uye-ol.html">Yeni Kayıt</a>
        <a href="#">Şifre Sıfırla</a>
    </div>
</div>

</body>
</html>
