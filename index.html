<style>
    /* --- MODERN UYARI PENCERESİ (MODAL) --- */
    #customAlert {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(15px); /* Arkayı asil bir şekilde bulandırır */
        display: none; /* Başlangıçta gizli */
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .alert-card {
        background: #111;
        border: 1px solid #222;
        width: 85%;
        max-width: 320px;
        border-radius: 28px;
        padding: 35px 25px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        transform: translateY(20px);
        transition: 0.3s ease-out;
    }

    .alert-card.show {
        transform: translateY(0);
    }

    .alert-icon {
        width: 50px;
        height: 50px;
        background: #1a1a1a;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 20px;
        color: #ff3b30; /* Hata kırmızısı */
        font-size: 24px;
        font-weight: bold;
        border: 1px solid #333;
    }

    .alert-title {
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 10px;
        color: #fff;
    }

    .alert-text {
        font-size: 14px;
        color: #888;
        line-height: 1.6;
        margin-bottom: 30px;
    }

    .alert-btn {
        background: #fff;
        color: #000;
        border: none;
        width: 100%;
        padding: 15px;
        border-radius: 15px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        transition: 0.2s;
    }

    .alert-btn:active {
        transform: scale(0.95);
        background: #ccc;
    }
</style>

<div id="customAlert">
    <div class="alert-card" id="alertCard">
        <div class="alert-icon">!</div>
        <div class="alert-title">ERİŞİM REDDİ</div>
        <div id="alertMessage" class="alert-text">Kimlik doğrulanamadı. Lütfen bilgilerinizi kontrol edin.</div>
        <button class="alert-btn" onclick="closeMyAlert()">TAMAM</button>
    </div>
</div>

<script>
    // Eski alert('') yerine bu fonksiyonu çağıracaksın
    function showModernAlert(message) {
        const overlay = document.getElementById('customAlert');
        const card = document.getElementById('alertCard');
        const msgElement = document.getElementById('alertMessage');

        msgElement.innerText = message;
        overlay.style.display = 'flex';
        
        // Küçük bir gecikmeyle animasyonu başlat
        setTimeout(() => {
            card.classList.add('show');
        }, 10);
    }

    function closeMyAlert() {
        const card = document.getElementById('alertCard');
        const overlay = document.getElementById('customAlert');
        
        card.classList.remove('show');
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 300);
    }

    // ÖRNEK KULLANIM: 
    // Senin giriş kontrol kodunda "alert('Hatalı giriş')" yazan yeri 
    // "showModernAlert('Kimlik doğrulanamadı...')" olarak değiştir.
</script>
