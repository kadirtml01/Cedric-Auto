<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedric Auto | Dashboard</title>
    <style>
        :root { --neon-blue: #00d4ff; --bg-dark: #0a0b10; --card-bg: #161b22; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; padding: 20px; text-align: center; background: linear-gradient(180deg, #161b22 0%, transparent 100%); border-bottom: 1px solid #30363d; }
        .header h1 { margin: 0; letter-spacing: 3px; color: var(--neon-blue); text-transform: uppercase; }

        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px; width: 90%; max-width: 1200px; }
        
        .stat-card { background: var(--card-bg); border-radius: 15px; padding: 25px; border: 1px solid #30363d; transition: 0.3s; position: relative; overflow: hidden; }
        .stat-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        
        .stat-card h3 { color: #8b949e; margin-top: 0; font-size: 0.9em; }
        .stat-value { font-size: 2em; font-weight: bold; color: white; }
        .unit { font-size: 0.5em; color: var(--neon-blue); margin-left: 5px; }

        .status-dot { height: 10px; width: 10px; background-color: #238636; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #2ea043; }
        
        .btn-action { margin-top: 30px; padding: 12px 30px; border-radius: 25px; border: none; background: var(--neon-blue); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-action:hover { background: #fff; box-shadow: 0 0 15px var(--neon-blue); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cedric Auto v1.0</h1>
        <p><span class="status-dot"></span> Sistem Çevrimiçi (OBDII Bağlı)</p>
    </div>

    <div class="dashboard">
        <div class="stat-card">
            <h3>MOTOR DEVRİ</h3>
            <div class="stat-value">0<span class="unit">RPM</span></div>
        </div>
        <div class="stat-card">
            <h3>HIZ</h3>
            <div class="stat-value">0<span class="unit">KM/H</span></div>
        </div>
        <div class="stat-card">
            <h3>MOTOR SICAKLIĞI</h3>
            <div class="stat-value">--<span class="unit">°C</span></div>
        </div>
        <div class="stat-card">
            <h3>AKÜ VOLTAJI</h3>
            <div class="stat-value">12.4<span class="unit">V</span></div>
        </div>
    </div>

    <button class="btn-action">TARAMAYI BAŞLAT</button>

</body>
</html>
