<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CEDRIC AUTO | PRO</title>
    <style>
        body { 
            background-color: #050505; color: #fff; 
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh;
        }
        .app-shell {
            width: 85%; max-width: 380px; background: #0d0d0d;
            padding: 40px 30px; border-radius: 30px;
            border: 1px solid #1a1a1a;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .brand-box { text-align: center; margin-bottom: 45px; }
        .brand-box h1 { 
            font-size: 26px; font-weight: 800; margin: 0; letter-spacing: 2px;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-box span { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 4px; }

        .input-field { margin-bottom: 20px; }
        .input-field label { 
            display: block; font-size: 11px; color: #666; margin-bottom: 10px;
            text-transform: uppercase; font-weight: 700;
        }
        .input-field input {
            width: 100%; background: #151515; border: 1px solid #222;
            padding: 15px; border-radius: 12px; color: #fff; font-size: 16px;
            box-sizing: border-box; transition: 0.3s;
        }
        .input-field input:focus { border-color: #444; background: #1a1a1a; outline: none; }

        .btn-connect {
            width: 100%; padding: 18px; border-radius: 12px; border: none;
            background: #fff; color: #000; font-weight: 800; font-size: 14px;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-connect:active { transform: scale(0.97); background: #ccc; }

        .bottom-nav { margin-top: 30px; text-align: center; }
        .bottom-nav a { 
            color: #444; text-decoration: none; font-size: 12px; font-weight: 600;
        }
        .divider { color: #222; margin: 0 10px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="brand-box">
        <h1>CEDRIC AUTO</h1>
        <span>Sytem Interface v1.0</span>
    </div>

    <div class="input-field">
        <label>Kullanıcı Tanımı</label>
        <input type="text" placeholder="ID Giriniz" spellcheck="false">
    </div>

    <div class="input-field">
        <label>Erişim Şifresi</label>
        <input type="password" placeholder="••••••••">
    </div>

    <button class="btn-connect">Sistemi Başlat</button>

    <div class="bottom-nav">
        <a href="uye-ol.html">Hesap Oluştur</a>
        <span class="divider">/</span>
        <a href="#">Yardım</a>
    </div>
</div>

</body>
</html>
