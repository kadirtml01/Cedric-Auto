<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CEDRIC AUTO | GİRİŞ</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #050505; color: #fff; 
            font-family: 'Segoe UI', sans-serif; margin: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        .login-card {
            width: 100%; max-width: 350px; padding: 30px;
            text-align: center;
        }

        .logo-img {
            width: 100%; height: 200px;
            background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1000&auto=format&fit=crop');
            background-size: cover; background-position: center;
            border-radius: 20px; margin-bottom: 30px;
            border: 1px solid #1a1a1a;
        }

        h1 { font-size: 24px; letter-spacing: 5px; margin-bottom: 5px; font-weight: 900; }
        p.subtitle { font-size: 10px; color: #444; letter-spacing: 3px; margin-bottom: 40px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 10px; color: #333; letter-spacing: 1px; text-transform: uppercase; margin-left: 5px; }
        
        input {
            width: 100%; background: #0d0d0d; border: 1px solid #1a1a1a;
            padding: 15px; border-radius: 12px; color: #fff;
            margin-top: 5px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #333; }

        .login-btn {
            width: 100%; background: #fff; color: #000; border: none;
            padding: 15px; border-radius: 12px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .login-btn:active { transform: scale(0.95); }

        /* --- MODERN UYARI PENCERESİ (MODAL) --- */
        #customAlert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 999;
        }
        .alert-card {
            background: #111; border: 1px solid #222; width: 80%;
            max-width: 300px; border-radius: 25px; padding: 30px; text-align: center;
            transform: scale(0.8); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .alert-card.show { transform: scale(1); }
        .alert-icon { font-size: 30px; color: #500; margin-bottom: 15px; }
        .alert-title { font-size: 16px; font-weight: 800; margin-bottom: 10px; }
        .alert-text { font-size: 13px; color: #666; margin-bottom: 25px; line-height: 1.5; }
        .alert-btn {
            background: #fff; color: #000; border: none; width: 100%;
            padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-img"></div>
    <h1>CEDRIC AUTO</h1>
    <p class="subtitle">SİSTEME BAĞLANIN</p>

    <div class="input-group">
        <label>ŞİFRE</label>
        <input type="password" id="passKey" placeholder="••••••••">
    </div>

    <button class="login-btn" onclick="checkLogin()">BAĞLANTIYI KUR</button>
</div>

<div id="customAlert">
    <div class="alert-card" id="alertCard">
        <div class="alert-icon">!</div>
        <div class="alert-title">KİMLİK HATASI</div>
        <div id="alertMessage" class="alert-text">Bilgiler doğrulanamadı.</div>
        <button class="alert-btn" onclick="closeAlert()">TEKRAR DENE</button>
    </div>
</div>

<script>
    function checkLogin() {
        const key = document.getElementById('passKey').value;
        
        // Burayı kendi şifrene göre ayarla
        if(key === "1234") { 
            window.location.href = "panel.html"; 
        } else {
            showModernAlert("Kimlik doğrulanamadı. Lütfen güvenlik anahtarını kontrol edin.");
        }
    }

    function showModernAlert(msg) {
        document.getElementById('alertMessage').innerText = msg;
        document.getElementById('customAlert').style.display = 'flex';
        setTimeout(() => {
            document.getElementById('alertCard').classList.add('show');
        }, 10);
    }

    function closeAlert() {
        document.getElementById('alertCard').classList.remove('show');
        setTimeout(() => {
            document.getElementById('customAlert').style.display = 'none';
        }, 300);
    }
</script>

</body>
</html>
