<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CEDRIC AUTO | REGISTER</title>
    <style>
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .app-shell { width: 85%; max-width: 380px; background: #0d0d0d; padding-bottom: 40px; border-radius: 30px; border: 1px solid #1a1a1a; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .header-banner { width: 100%; height: 120px; background-image: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1000&auto=format&fit=crop'); background-size: cover; background-position: center; position: relative; }
        .header-overlay { position: absolute; bottom: 0; width: 100%; height: 100%; background: linear-gradient(to top, #0d0d0d, rgba(0,0,0,0.4)); }
        .content-area { padding: 0 30px; }
        .brand-box { text-align: left; margin: 25px 0; border-left: 3px solid #fff; padding-left: 15px; }
        .brand-box h1 { font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin:0; }
        .input-field { margin-bottom: 15px; }
        .input-field label { display: block; font-size: 9px; color: #666; text-transform: uppercase; margin-bottom: 6px; font-weight: 700; }
        .input-field input { width: 100%; background: #151515; border: 1px solid #222; padding: 12px; border-radius: 10px; color: #fff; outline: none; box-sizing: border-box; }
        .btn-register { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #fff; background: transparent; color: #fff; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="header-banner"><div class="header-overlay"></div></div>
    <div class="content-area">
        <div class="brand-box"><h1>Sistem Kaydı</h1><span>New Operator</span></div>
        <div class="input-field"><label>Kullanıcı Adı (ID)</label><input type="text" id="regUser" placeholder="Yeni ID"></div>
        <div class="input-field"><label>Erişim Anahtarı</label><input type="password" id="regPass" placeholder="••••••••"></div>
        <button class="btn-register" onclick="kayitYap()">Kaydı Tamamla</button>
    </div>
</div>
<script>
function kayitYap() {
    const user = document.getElementById('regUser').value.trim();
    const pass = document.getElementById('regPass').value.trim();

    if(user.length < 3 || pass.length < 4) {
        alert("Kullanıcı adı en az 3, şifre en az 4 karakter olmalıdır!");
        return;
    }

    localStorage.setItem('db_user', user);
    localStorage.setItem('db_pass', pass);
    
    alert("Kayıt Başarılı! Sisteme " + user + " olarak giriş yapabilirsiniz.");
    window.location.href = 'index.html';
}
</script>
</body>
</html>
